version: 1
skill: godot-dev

config:
  default_model: sonnet
  max_budget_per_test: 0.25
  max_budget_total: 3.00

triggers:
  should_trigger:
    # Scene/node creation
    - "add an enemy to my Godot game"
    - "create a new scene for the player"
    - "build a health component"
    - "I need a projectile script"

    # Procedural content systems
    - "generate terrain for my zones"
    - "I need a loot table system"
    - "build enemy wave spawning"
    - "procedural prop placement"
    - "create a recipe for spawning"

    # Architecture
    - "how should I structure my inventory system in Godot"
    - "refactor this GDScript to use components"
    - "add a new autoload singleton"
    - "set up collision layers for my game"

    # General Godot work
    - "write a GDScript for enemy AI"
    - "help me with this .tscn scene"
    - "fix this Godot shader"
    - "create a Resource subclass for gear data"

  should_not_trigger:
    - "write a Python web scraper"
    - "help me with my React components"
    - "create a REST API in Node.js"
    - "review this SQL query"
    - "set up a Docker container"

  edge_cases:
    - query: "procedurally generate some rocks"
      expect: trigger
      note: "Should trigger and guide toward Recipe-Generator pattern, not code-generated meshes"
    - query: "create a mesh in code"
      expect: trigger
      note: "Should trigger and redirect away from code-generated assets"
    - query: "I need random enemy spawns"
      expect: trigger
      note: "Should trigger and guide toward seeded RNG with Recipe pattern"
    - query: "make a simple game"
      expect: no_trigger
      note: "Too vague — could be any engine or framework"

behavioral:
  - name: "rejects code-generated meshes"
    input: "Create a BoxMesh in code for my Godot enemy placeholder"
    max_turns: 3
    assertions:
      - type: output_does_not_match
        pattern: "BoxMesh\\.new\\(\\)"
      - type: output_matches
        pattern: "(?i)(scene|tscn|editor|recipe)"

  - name: "recommends recipe pattern for procedural content"
    input: "I need to procedurally scatter rocks around my Godot zone"
    max_turns: 3
    assertions:
      - type: output_matches
        pattern: "(?i)(recipe|resource|export|generator)"
      - type: output_does_not_match
        pattern: "SphereMesh\\.new|BoxMesh\\.new|PlaneMesh\\.new"

  - name: "enforces script conventions"
    input: "Write a basic GDScript for an enemy that chases the player"
    max_turns: 5
    assertions:
      - type: output_matches
        pattern: "@tool"
      - type: output_matches
        pattern: "class_name"
      - type: output_matches
        pattern: "@export"
