version: 1
skill: commit

config:
  default_model: sonnet
  default_max_turns: 1
  max_budget_per_test: 0.02
  max_budget_total: 0.60

triggers:
  should_trigger:
    - "commit my changes"
    - "create commits"
    - "commit this work"
    - "commit the changes"
    - "make commits for these changes"
    - "commit what I've done"
    - "can you commit this"

  should_not_trigger:
    - "what is a conventional commit?"
    - "explain the commit history"
    - "revert the last commit"
    - "show me the git log"
    - "how do I write a good commit message?"
    - "undo my last commit"

  edge_cases:
    - query: "help me write a commit message"
      expect: no_trigger
      note: "Asking for help/advice about writing, not requesting a commit"
    - query: "write a commit message"
      expect: trigger
      note: "Directing Claude to write one, not asking for help about how"
    - query: "commit"
      expect: trigger
      note: "Single-word trigger should activate the skill"
    - query: "stage and commit these files"
      expect: trigger
      note: "Explicit commit request with staging intent"
    - query: "commit fix the login bug"
      expect: trigger
      note: "Commit with arguments should trigger and use message as guidance"
