# ── Assertion Type Reference ─────────────────────────────────────
# Hard assertions (deterministic, checked from stream-json data):
#   no_errors              - No error messages or failed tool calls in output
#   tool_called            - A specific tool was invoked (value: tool name)
#   skill_invoked          - A specific skill was triggered (value: skill name)
#   output_matches         - Response text matches regex (pattern: regex string)
#   output_does_not_match  - Response text does NOT match regex (pattern: regex string)
#   exit_success           - Process exited with code 0
#   max_turns_ok           - Completed within max_turns (didn't hit limit)
#   tool_sequence          - Tools invoked in order (value: list of tool names)
#   tool_call_count        - Tool invoked N times (value: tool name, count: N, op: eq|gte|lte)
#   file_exists            - File exists in workdir (value: relative path; requires setup block)
#   file_not_exists        - File does NOT exist in workdir (value: relative path; requires setup)
#   directory_exists       - Directory exists in workdir (value: relative path; requires setup)
#   file_contains          - File contains regex (value: path, pattern: regex; requires setup)
#
# Soft assertions (evaluated by Claude with --tools ""):
#   asks_clarification          - Claude asks for more info instead of guessing
#   stays_in_scope              - Doesn't perform actions outside skill's domain
#   suggests_fix                - Provides actionable remediation for errors
#   mentions_error              - Surfaces a specific error condition (value: keyword)
#   does_not_hallucinate_success - Doesn't claim success when action failed
#   contains_step               - Output includes a specific workflow step (value: description)
#   follows_instructions        - Follows the skill's documented workflow order
#   (Add severity: error to any soft assertion to promote it to a hard failure)
#
# ── CLI Flags Reference ──────────────────────────────────────────
# --json              JSON output only
# --layer N           Run only layer 1, 2, or 3
# --model MODEL       Override model for test runs
# --dry-run           Show plan without running
# --plugin-dir DIR    Plugin directory (auto-detected if omitted)
# --parallel N        Run N tests concurrently (default: 1)
# --runs N            Run suite N times for flakiness detection (default: 1)
# --tests PATH        Path to TESTS.yaml (test specs live outside the skill folder)
# --save-results      Save results to test-results/ next to the TESTS.yaml file
# --compare BASELINE  Compare against baseline file (path or 'latest')
