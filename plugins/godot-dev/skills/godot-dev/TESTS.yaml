version: 1
skill: godot-dev

config:
  default_model: sonnet
  max_budget_per_test: 0.25
  max_budget_total: 3.00

triggers:
  should_trigger:
    # Scene/node creation
    - "add an enemy to my Godot game"
    - "create a new scene for the player"
    - "build a health component"
    - "I need a projectile script"

    # Procedural content systems
    - "generate terrain for my zones"
    - "I need a loot table system"
    - "build enemy wave spawning"
    - "procedural prop placement"
    - "create a spawn config resource"

    # Architecture
    - "how should I structure my inventory system in Godot"
    - "refactor this GDScript to use components"
    - "add a new autoload singleton"
    - "set up collision layers for my game"

    # General Godot work
    - "write a GDScript for enemy AI"
    - "help me with this .tscn scene"
    - "fix this Godot shader"
    - "create a Resource subclass for gear data"

  should_not_trigger:
    - "write a Python web scraper"
    - "help me with my React components"
    - "create a REST API in Node.js"
    - "review this SQL query"
    - "set up a Docker container"

  edge_cases:
    - query: "procedurally generate some rocks"
      expect: trigger
      note: "Should trigger and guide toward editor-authored rock scenes with a scatter config"
    - query: "create a mesh in code"
      expect: trigger
      note: "Should trigger and evaluate whether procedural geometry is appropriate or if a scene would be better"
    - query: "I need random enemy spawns"
      expect: trigger
      note: "Should trigger and guide toward data-driven config with seeded RNG"
    - query: "make a simple game"
      expect: no_trigger
      note: "Too vague -- could be any engine or framework"

behavioral:
  - name: "builds scene tree instead of script-only construction"
    input: "Create a basic enemy for my Godot 3D game with health and movement"
    max_turns: 5
    assertions:
      - type: output_matches
        pattern: "(?i)(scene|tscn|node|CharacterBody|add_node)"
      - type: output_matches
        pattern: "(?i)(component|HealthComponent|health)"

  - name: "uses data-driven resources for configurable content"
    input: "I need to procedurally scatter rocks around my Godot zone"
    max_turns: 3
    assertions:
      - type: output_matches
        pattern: "(?i)(resource|config|export|tres|PackedScene)"

  - name: "recommends MCP tools for scene construction"
    input: "Set up a basic 3D level in my Godot project with ground, lighting, and a player spawn point"
    max_turns: 5
    assertions:
      - type: output_matches
        pattern: "(?i)(godot-mcp|create_scene|add_node|scene)"
      - type: output_does_not_match
        pattern: "PlaneMesh\\.new|BoxMesh\\.new|DirectionalLight3D\\.new\\(\\)"

  - name: "does not put @tool on gameplay scripts"
    input: "Write a GDScript for an enemy that chases the player in Godot"
    max_turns: 5
    assertions:
      - type: output_does_not_match
        pattern: "^@tool"
      - type: output_matches
        pattern: "(?i)(extends|CharacterBody|Node)"
