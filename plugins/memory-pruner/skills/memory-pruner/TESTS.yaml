version: 1
skill: memory-pruner

config:
  default_model: sonnet
  default_max_turns: 3

triggers:
  should_trigger:
    - "prune my memory files"
    - "clean up memory"
    - "consolidate memories"

  should_not_trigger:
    - "remember that I prefer TypeScript"
    - "save this to memory"
    - "what do you remember about me"

  edge_cases:
    - query: "audit my memory files for stale entries"
      expect: trigger
      note: "Uses 'audit' instead of 'prune' but clearly targets memory cleanup"
    - query: "delete old project notes"
      expect: no_trigger
      note: "'Notes' is ambiguous — could mean files in the repo, not memory"

behavioral: []
