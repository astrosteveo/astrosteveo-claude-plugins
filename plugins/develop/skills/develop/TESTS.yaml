version: 1
skill: develop

config:
  default_model: sonnet
  default_max_turns: 5

triggers:
  should_trigger:
    - "let's develop a new authentication system"
    - "I need to implement a caching layer that touches the API and database modules"
    - "/develop refactor the payment processing pipeline"

  should_not_trigger:
    - "fix the typo in the README"
    - "what does this function do?"
    - "rename this variable to camelCase"

  edge_cases:
    - query: "implement issue #42"
      expect: trigger
      note: "GitHub issue reference should trigger the workflow"
    - query: "I want to add a small helper function"
      expect: no_trigger
      note: "Small single-file additions don't need a formal workflow"
    - query: "let's think through how to approach this refactor"
      expect: trigger
      note: "Methodical language signals the user wants the full workflow"

behavioral: []
