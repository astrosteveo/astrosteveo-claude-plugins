version: 1
type: hooks

hooks:
  # ── SessionStart ──────────────────────────────────────────────────
  session-start:
    script: session-start.sh
    event: SessionStart
    scenarios:
      - name: resume-note-surfaces-without-cleanup
        description: Surfaces resume note from CLAUDE.md but does not modify it
        setup:
          git_init: true
          files:
            "CLAUDE.md": |
              # My Project

              ## Session Resume Note

              Previous session worked on auth module.

              ## End Session Resume Note
          commit: true
        expect:
          exit_code: 0
          stdout_contains:
            - "=== Session Resume Note ==="
            - "Previous session worked on auth module"
            - "=== End Session Resume Note ==="
            - "ACTION: After reviewing with the user"
          file_contains:
            "CLAUDE.md":
              - "Session Resume Note"
          git_log_not_contains:
            - "chore: remove session resume note"

      - name: no-resume-note
        description: No resume note in CLAUDE.md — no output
        setup:
          git_init: true
          files:
            "CLAUDE.md": "# My Project"
          commit: true
        expect:
          exit_code: 0
          stdout_not_contains:
            - "Session Resume Note"

      - name: no-claude-md
        description: No CLAUDE.md at all — exits cleanly
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
        expect:
          exit_code: 0
          stdout_not_contains:
            - "Session Resume Note"

  # ── PreToolUse Guard ──────────────────────────────────────────────
  pre-tool-guard:
    script: pre-tool-guard.sh
    event: PreToolUse
    scenarios:
      - name: blocks-git-add-all
        description: Blocks git add -A
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git add -A"}'
        expect:
          exit_code: 0
          stdout_contains:
            - '"decision":"block"'
            - "Broad staging commands"

      - name: blocks-git-add-dot
        description: Blocks git add .
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git add ."}'
        expect:
          exit_code: 0
          stdout_contains:
            - '"decision":"block"'

      - name: blocks-force-push
        description: Blocks git push --force
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git push --force origin main"}'
        expect:
          exit_code: 0
          stdout_contains:
            - '"decision":"block"'
            - "Force push"

      - name: blocks-force-push-short
        description: Blocks git push -f
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git push -f"}'
        expect:
          exit_code: 0
          stdout_contains:
            - '"decision":"block"'

      - name: blocks-hard-reset
        description: Blocks git reset --hard
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git reset --hard HEAD~1"}'
        expect:
          exit_code: 0
          stdout_contains:
            - '"decision":"block"'
            - "Hard reset"

      - name: blocks-git-clean
        description: Blocks git clean -f
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git clean -fd"}'
        expect:
          exit_code: 0
          stdout_contains:
            - '"decision":"block"'
            - "git clean"

      - name: blocks-checkout-dot
        description: Blocks git checkout -- .
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git checkout -- ."}'
        expect:
          exit_code: 0
          stdout_contains:
            - '"decision":"block"'

      - name: allows-targeted-git-add
        description: Allows git add with specific files
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git add src/app.js src/lib.js"}'
        expect:
          exit_code: 0
          stdout_not_contains:
            - '"decision":"block"'

      - name: allows-normal-push
        description: Allows normal git push
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"git push origin feature-branch"}'
        expect:
          exit_code: 0
          stdout_not_contains:
            - '"decision":"block"'

      - name: allows-non-git-commands
        description: Allows non-git bash commands
        setup:
          git_init: false
          files: {}
        stdin: '{"tool_name":"Bash","command":"npm test"}'
        expect:
          exit_code: 0
          stdout_not_contains:
            - '"decision":"block"'

  # ── PostCompact ───────────────────────────────────────────────────
  post-compact:
    script: post-compact.sh
    event: PostCompact
    scenarios:
      - name: clean-tree-shows-recent-commits
        description: Clean working tree — shows recent commits for orientation
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
        expect:
          exit_code: 0
          stdout_contains:
            - "=== Post-Compaction Context ==="
            - "Working tree is clean"
            - "=== End Post-Compaction Context ==="
          stdout_not_contains:
            - "IMPORTANT"

      - name: dirty-tree-shows-uncommitted
        description: Dirty working tree — surfaces uncommitted files with urgency
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
          modifications:
            "app.js": "console.log('changed')"
        expect:
          exit_code: 0
          stdout_contains:
            - "=== Post-Compaction Context ==="
            - "IMPORTANT: You have uncommitted changes"
            - "app.js"
            - "=== End Post-Compaction Context ==="

      - name: untracked-files-surfaced
        description: Untracked files are surfaced after compaction
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
          new_files:
            "scratch.js": "// temp"
        expect:
          exit_code: 0
          stdout_contains:
            - "IMPORTANT"
            - "Untracked"
            - "scratch.js"

      - name: not-a-git-repo
        description: Not in a git repo — exits cleanly
        setup:
          git_init: false
          files:
            "app.js": "console.log('hello')"
        expect:
          exit_code: 0
          stdout_not_contains:
            - "Post-Compaction Context"

  # ── Stop Gate ─────────────────────────────────────────────────────
  stop-gate:
    script: stop-gate.sh
    event: Stop
    scenarios:
      - name: no-changes
        description: No changes at all — allows stop
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
        expect:
          exit_code: 0

      - name: unstaged-modifications
        description: Blocks with categorized file list when files are modified
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
          modifications:
            "app.js": "console.log('changed')"
        expect:
          exit_code: 2
          stderr_contains:
            - "BLOCKED: You have uncommitted changes"
            - "Modified (not staged)"
            - "app.js"
            - "Resolve ALL of the above in a single turn"

      - name: untracked-files
        description: Blocks when there are untracked files
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
          new_files:
            "newfile.js": "// new file"
        expect:
          exit_code: 2
          stderr_contains:
            - "BLOCKED: You have uncommitted changes"
            - "Untracked (new files)"
            - "newfile.js"

      - name: mixed-state
        description: Reports all categories at once for single-turn resolution
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
            "lib.js": "module.exports = {}"
          commit: true
          modifications:
            "app.js": "console.log('changed')"
          new_files:
            "newfile.js": "// new"
        expect:
          exit_code: 2
          stderr_contains:
            - "Modified (not staged)"
            - "Untracked (new files)"
            - "Resolve ALL"

      - name: not-a-git-repo
        description: Not in a git repo — allows stop
        setup:
          git_init: false
          files:
            "app.js": "console.log('hello')"
        expect:
          exit_code: 0

  # ── SessionEnd ────────────────────────────────────────────────────
  session-end:
    script: session-end.sh
    event: SessionEnd
    scenarios:
      - name: records-unstaged-changes
        description: Records modified files in resume note without committing
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
            "CLAUDE.md": "# My Project"
          commit: true
          modifications:
            "app.js": "console.log('changed')"
        expect:
          exit_code: 0
          file_contains:
            "CLAUDE.md":
              - "## Session Resume Note"
              - "app.js"
              - "Modified (not staged)"
              - "Review these changes with the user"
              - "## End Session Resume Note"
          git_log_not_contains:
            - "session-end"

      - name: records-untracked-files
        description: Lists untracked files in the resume note
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
            "CLAUDE.md": "# My Project"
          commit: true
          new_files:
            "newfile.js": "// brand new"
        expect:
          exit_code: 0
          file_contains:
            "CLAUDE.md":
              - "## Session Resume Note"
              - "Untracked (new files)"
              - "newfile.js"
              - "## End Session Resume Note"

      - name: no-changes-exits-cleanly
        description: No uncommitted changes — does not modify CLAUDE.md
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
            "CLAUDE.md": "# My Project"
          commit: true
        expect:
          exit_code: 0
          file_not_contains:
            "CLAUDE.md":
              - "Session Resume Note"

      - name: replaces-existing-resume-note
        description: Removes old resume note and writes a new one
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
            "CLAUDE.md": |
              # My Project

              ## Session Resume Note

              Old note that should be replaced.

              ## End Session Resume Note
          commit: true
          modifications:
            "app.js": "console.log('changed')"
        expect:
          exit_code: 0
          file_contains:
            "CLAUDE.md":
              - "## Session Resume Note"
              - "app.js"
          file_not_contains:
            "CLAUDE.md":
              - "Old note that should be replaced"

      - name: creates-claude-md-if-missing
        description: Creates CLAUDE.md with resume note when it does not exist
        setup:
          git_init: true
          files:
            "app.js": "console.log('hello')"
          commit: true
          modifications:
            "app.js": "console.log('changed')"
        expect:
          exit_code: 0
          file_exists:
            - "CLAUDE.md"
          file_contains:
            "CLAUDE.md":
              - "## Session Resume Note"
              - "app.js"

      - name: not-a-git-repo
        description: Not in a git repo — exits cleanly
        setup:
          git_init: false
          files:
            "app.js": "console.log('hello')"
        expect:
          exit_code: 0
